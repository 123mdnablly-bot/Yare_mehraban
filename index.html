// =============== بازی جدول کلمات متقاطع ===============
let crosswordData = {
    words: [
        { word: "قرآن", clue: "کتاب آسمانی مسلمانان", row:1, col:1, direction:"horizontal" },
        { word: "مسجد", clue: "محل عبادت مسلمانان", row:3, col:2, direction:"horizontal" },
        { word: "نماز", clue: "واجب روزانه", row:5, col:3, direction:"horizontal" },
        { word: "امام", clue: "رهبر نماز جماعت", row:2, col:4, direction:"vertical" },
        { word: "حج", clue: "یکی از فروع دین", row:4, col:1, direction:"vertical" }
    ]
};
let crosswordGrid = [], crosswordUserAnswers = [];
function initCrossword(){
    let size = 8;
    crosswordGrid = Array(size).fill().map(() => Array(size).fill({ letter: '', fixed: false }));
    for(let w of crosswordData.words){
        let r = w.row-1, c = w.col-1;
        for(let i=0; i<w.word.length; i++){
            if(r<size && c<size){
                let letter = w.word[i];
                crosswordGrid[r][c] = { letter: letter, fixed: true };
                if(w.direction === 'horizontal') c++;
                else r++;
            }
        }
    }
    crosswordUserAnswers = Array(size).fill().map(() => Array(size).fill(''));
    renderCrossword();
}
function renderCrossword(){
    let size = crosswordGrid.length;
    let html = `<div class="card"><h3>🔍 جدول کلمات متقاطع (بدون امتیاز اصلی)</h3><div style="display:grid; grid-template-columns:repeat(${size}, 50px); gap:2px; justify-content:center;">`;
    for(let i=0; i<size; i++){
        for(let j=0; j<size; j++){
            let cell = crosswordGrid[i][j];
            let isFixed = cell && cell.fixed;
            let value = crosswordUserAnswers[i][j];
            if(isFixed){
                html += `<div style="width:50px;height:50px;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1.2rem;">${cell.letter}</div>`;
            } else {
                html += `<div style="width:50px;height:50px;"><input type="text" maxlength="1" data-row="${i}" data-col="${j}" value="${value}" style="width:100%;height:100%;text-align:center;font-size:1rem;"></div>`;
            }
        }
        html += `<br>`;
    }
    html += `</div><div class="flex"><button id="checkCrosswordBtn" class="btn-success">بررسی جدول</button><button id="resetCrosswordBtn" class="btn-warning">پاک کردن</button><button id="backCrosswordBtn" class="btn">بازگشت</button></div><div id="crosswordResult"></div></div>`;
    document.getElementById('content-area').innerHTML = html;
    document.querySelectorAll('#content-area input').forEach(inp => {
        inp.oninput = (e) => {
            let row = parseInt(inp.dataset.row), col = parseInt(inp.dataset.col);
            crosswordUserAnswers[row][col] = inp.value.toUpperCase();
        };
    });
    document.getElementById('checkCrosswordBtn').onclick = () => {
        let correct = 0, total = 0;
        for(let w of crosswordData.words){
            let r = w.row-1, c = w.col-1;
            for(let i=0; i<w.word.length; i++){
                total++;
                let ans = crosswordUserAnswers[r][c] || '';
                if(ans.toUpperCase() === w.word[i]) correct++;
                if(w.direction === 'horizontal') c++;
                else r++;
            }
        }
        document.getElementById('crosswordResult').innerHTML = `<p>✅ نتیجه: ${correct} از ${total} حرف درست. تلاش مجدد!</p>`;
        if(correct === total) alert("🎉 تبریک! جدول را کامل حل کردید!");
    };
    document.getElementById('resetCrosswordBtn').onclick = () => {
        crosswordUserAnswers = Array(size).fill().map(() => Array(size).fill(''));
        renderCrossword();
    };
    document.getElementById('backCrosswordBtn').onclick = () => showGamesHub();
}

// =============== بازی تطابق حافظه (Memory Match) جدید ===============
let memoryMatchCards = [];
let memoryMatchFlipped = [];
let memoryMatchMatched = [];
let memoryMatchLock = false;
let memoryMatchFirst = null, memoryMatchSecond = null;
let memoryMatchScore = 0;
const memoryMatchTopics = [
    { id: 1, name: "🕌 کعبه", pairId: 1 },
    { id: 2, name: "🕌 کعبه", pairId: 1 },
    { id: 3, name: "📖 قرآن", pairId: 2 },
    { id: 4, name: "📖 قرآن", pairId: 2 },
    { id: 5, name: "🧪 دانشمند", pairId: 3 },
    { id: 6, name: "🧪 دانشمند", pairId: 3 },
    { id: 7, name: "🌙 رمضان", pairId: 4 },
    { id: 8, name: "🌙 رمضان", pairId: 4 }
];
function initMemoryMatch() {
    memoryMatchCards = [...memoryMatchTopics];
    for (let i = memoryMatchCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [memoryMatchCards[i], memoryMatchCards[j]] = [memoryMatchCards[j], memoryMatchCards[i]];
    }
    memoryMatchFlipped = new Array(memoryMatchCards.length).fill(false);
    memoryMatchMatched = new Array(memoryMatchCards.length).fill(false);
    memoryMatchFirst = memoryMatchSecond = null;
    memoryMatchLock = false;
    memoryMatchScore = 0;
    renderMemoryMatch();
}
function renderMemoryMatch() {
    let html = `<div class="card"><h3>🧠 بازی تطابق حافظه (بدون امتیاز اصلی)</h3>
    <p>امتیاز شما: ${memoryMatchScore}</p>
    <div class="flex" style="justify-content:center; flex-wrap:wrap;">`;
    for (let i = 0; i < memoryMatchCards.length; i++) {
        let isFlipped = memoryMatchFlipped[i] || memoryMatchMatched[i];
        let content = isFlipped ? memoryMatchCards[i].name : "❓";
        let bgColor = memoryMatchMatched[i] ? "#c8e6c9" : (memoryMatchFlipped[i] ? "#fff3cd" : "#e2e8f0");
        html += `<div class="memory-card" data-idx="${i}" style="width:100px;height:100px;background:${bgColor};border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;margin:5px;">${content}</div>`;
    }
    html += `</div><div class="flex"><button id="resetMemoryMatchBtn" class="btn-warning">🔄 بازی جدید</button><button id="backMemoryMatchBtn" class="btn">بازگشت</button></div></div>`;
    document.getElementById('content-area').innerHTML = html;
    attachMemoryMatchEvents();
}
function attachMemoryMatchEvents() {
    document.querySelectorAll('.memory-card').forEach(card => {
        card.onclick = () => {
            if (memoryMatchLock) return;
            let idx = parseInt(card.dataset.idx);
            if (memoryMatchMatched[idx] || memoryMatchFlipped[idx]) return;
            memoryMatchFlipped[idx] = true;
            if (memoryMatchFirst === null) {
                memoryMatchFirst = idx;
            } else if (memoryMatchSecond === null && memoryMatchFirst !== idx) {
                memoryMatchSecond = idx;
                memoryMatchLock = true;
                setTimeout(() => {
                    let card1 = memoryMatchCards[memoryMatchFirst];
                    let card2 = memoryMatchCards[memoryMatchSecond];
                    if (card1.pairId === card2.pairId) {
                        memoryMatchMatched[memoryMatchFirst] = true;
                        memoryMatchMatched[memoryMatchSecond] = true;
                        memoryMatchScore += 10;
                        addActivityLog(currentUser.id, "بازی تطابق", `یک جفت پیدا کرد! +۱۰ امتیاز (فقط در بازی)`);
                    } else {
                        memoryMatchFlipped[memoryMatchFirst] = false;
                        memoryMatchFlipped[memoryMatchSecond] = false;
                    }
                    memoryMatchFirst = null;
                    memoryMatchSecond = null;
                    memoryMatchLock = false;
                    renderMemoryMatch();
                    if (memoryMatchMatched.every(m => m === true)) {
                        alert(`🎉 تبریک! بازی تمام شد. امتیاز شما: ${memoryMatchScore}`);
                    }
                }, 500);
            }
            renderMemoryMatch();
        };
    });
    document.getElementById('resetMemoryMatchBtn').onclick = () => initMemoryMatch();
    document.getElementById('backMemoryMatchBtn').onclick = () => renderMainMenu();
}

function toJalali(gy,gm,gd){ let g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334]; let gy2=(gm>2)?(gy+1):gy; let days=355666+(365*gy)+Math.floor((gy+3)/4)-Math.floor((gy+99)/100)+Math.floor((gy+399)/400)+gd+g_d_m[gm-1]; let jy=-1595+(33*Math.floor(days/12053)); days%=12053; let jm=Math.floor(days/31); days%=31; if(jm>6){ jm=6; days+=31; } let jd=days+1; if(jm>6) jm+=2; else jm+=1; return {year:jy,month:jm,day:jd}; }
function getCurrentJalali(){ let d=new Date(); let j=toJalali(d.getFullYear(),d.getMonth()+1,d.getDate()); return `${j.year}/${j.month.toString().padStart(2,'0')}/${j.day.toString().padStart(2,'0')}`; }

    // =============== توابع کمکی چت‌بات ===============
    function levenshteinDistance(a,b){
        if(a.length===0) return b.length; if(b.length===0) return a.length;
        let matrix=[];
        for(let i=0;i<=b.length;i++) matrix[i]=[i];
        for(let j=0;j<=a.length;j++) matrix[0][j]=j;
        for(let i=1;i<=b.length;i++){
            for(let j=1;j<=a.length;j++){
                if(b.charAt(i-1)===a.charAt(j-1)) matrix[i][j]=matrix[i-1][j-1];
                else matrix[i][j]=Math.min(matrix[i-1][j-1]+1, matrix[i][j-1]+1, matrix[i-1][j]+1);
            }
        }
        return matrix[b.length][a.length];
    }
    function findBestPattern(input){
        input=input.trim().toLowerCase();
        let bestMatch=null, bestDist=3;
        for(let p of chatbotPatterns){
            let dist=levenshteinDistance(input, p.pattern.toLowerCase());
            if(dist<bestDist){ bestDist=dist; bestMatch=p; }
        }
        return bestMatch;
    }
    function chatReply(inp){
        inp=inp.trim().toLowerCase();
        if(inp.startsWith('یاد بگیر')){
            let parts=inp.slice(8).split('=');
            if(parts.length===2){ chatMemory.learned[parts[0].trim()]=parts[1].trim(); saveToLocal(); return `یاد گرفتم: "${parts[0].trim()}"`; }
            return 'فرمان: یاد بگیر کلید = مقدار';
        }
        let best=findBestPattern(inp);
        if(best){
            let response=best.response;
            if(response.includes('{{score}}')) response=response.replace('{{score}}', currentUser.score===Infinity?'∞':currentUser.score);
            return response;
        }
        for(let k in chatMemory.learned) if(inp.includes(k)) return chatMemory.learned[k];
        return 'متوجه نشدم. با «یاد بگیر» به من بیاموز.';
    }
    function importChatbotJSON(){
        let inp=document.createElement('input'); inp.type='file'; inp.accept='application/json';
        inp.onchange=e=>{ let f=e.target.files[0]; if(!f) return; let fr=new FileReader(); fr.onload=ev=>{ try{ let d=JSON.parse(ev.target.result); if(d.patterns) chatbotPatterns=d.patterns; alert("داده‌های چت‌بات با موفقیت بارگذاری شد."); } catch(e){ alert("فایل JSON نامعتبر"); } }; fr.readAsText(f); }; inp.click();
    }
