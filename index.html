function addNotification(userId, title, body, link){ let notif = { id: Date.now(), userId, title, body, link, isRead: false, date: new Date().toLocaleString() }; notifications.push(notif); saveToLocal(); if(currentUser && currentUser.id === userId) updateUnreadCount(); }
function updateUnreadCount(){ let unread = notifications.filter(n => n.userId === currentUser.id && !n.isRead).length; let badge = document.getElementById("unreadCount"); if(unread > 0){ badge.innerText = unread; badge.style.display = "inline-block"; } else badge.style.display = "none"; }
function showNotifications(){ let userNotifs = notifications.filter(n => n.userId === currentUser.id).reverse(); let html = `<div class="card"><h3>🔔 اعلان‌ها</h3><div id="notifList">`; if(userNotifs.length === 0) html += "<p>هیچ اعلانی وجود ندارد.</p>"; userNotifs.forEach(n => { html += `<div class="user-row" style="background:${n.isRead?'#e9ecef':'#fff3cd'}; margin-bottom:8px;"><div><strong>${n.title}</strong><br>${n.body}<br><small>${n.date}</small></div>${!n.isRead ? `<button class="btn-success" data-id="${n.id}">خوانده شد</button>` : ''}${n.link ? `<button class="btn" data-link="${n.link}">مشاهده</button>` : ''}</div>`; }); html += `</div><button id="markAllRead" class="btn-warning">همه خوانده شد</button><button id="closeNotif" class="btn">بستن</button></div>`; document.getElementById('content-area').innerHTML = html; document.querySelectorAll('[data-id]').forEach(btn => { btn.onclick = () => { let id = parseInt(btn.dataset.id); let notif = notifications.find(n=>n.id===id); if(notif) notif.isRead = true; saveToLocal(); showNotifications(); updateUnreadCount(); }; }); document.querySelectorAll('[data-link]').forEach(btn => { btn.onclick = () => { let link = btn.dataset.link; if(link === "polls") showPollManagement(); else if(link === "tasks") showTaskManagement(); else if(link === "programs") showManagePrograms(); else renderMainMenu(); }; }); document.getElementById('markAllRead').onclick = () => { notifications.forEach(n => { if(n.userId === currentUser.id) n.isRead = true; }); saveToLocal(); showNotifications(); updateUnreadCount(); }; document.getElementById('closeNotif').onclick = () => renderMainMenu(); }
function checkAndGrantAchievements(userId){ let user = users.find(u=>u.id===userId); if(!user) return; let newAchievements = []; for(let ach of achievementsList){ if(!user.achievements.includes(ach.id) && ach.condition(user)){ user.achievements.push(ach.id); newAchievements.push(ach.title); addNotification(userId, "🏆 دستاورد جدید", `شما موفق به دریافت مدال "${ach.title}" شدید!`, ""); } } if(newAchievements.length) saveToLocal(); }
function showUserAchievements(userId){ let user = users.find(u=>u.id===userId); if(!user) return; let earned = user.achievements || []; let html = `<div class="card"><h3>🏆 دستاوردهای ${user.fullName}</h3><div class="flex">`; for(let ach of achievementsList){ let has = earned.includes(ach.id); html += `<div class="achievement-badge" style="background:${has?'#f1c40f':'#95a5a6'};">${ach.title} ${has?'✅':'❌'}<br><small>${ach.desc}</small></div>`; } html += `</div><button class="btn" onclick="renderMainMenu()">بازگشت</button></div>`; document.getElementById('content-area').innerHTML = html; }
function addActivityLog(userId, action, details){ activityLog.push({ userId, action, details, date: new Date().toLocaleString() }); saveToLocal(); }
function showUserActivity(userId){ let userLogs = activityLog.filter(l=>l.userId===userId).reverse(); let html = `<div class="card"><h3>📜 تاریخچه فعالیت‌های ${users.find(u=>u.id===userId)?.fullName}</h3>`; if(userLogs.length===0) html += "<p>هیچ فعالیتی ثبت نشده است.</p>"; else { html += `<table style="width:100%"><thead><tr><th>تاریخ</th><th>فعالیت</th><th>جزئیات</th></tr></thead><tbody>`; userLogs.forEach(log => { html += `<tr><td>${log.date}</td><td>${log.action}</td><td>${log.details || ''}‌</td></tr>`; }); html += `</tbody><table>`; } html += `<button class="btn" onclick="renderMainMenu()">بازگشت</button></div>`; document.getElementById('content-area').innerHTML = html; }
function showDateConverter(){ let html = `<div class="card"><h3>🔄 تبدیل تاریخ شمسی و میلادی</h3><div class="flex"><input type="text" id="jalaliInput" placeholder="تاریخ شمسی (مثال: 1403/12/25)"><button id="toGregorian">به میلادی</button></div><div id="gregorianResult"></div><hr><div class="flex"><input type="text" id="gregorianInput" placeholder="تاریخ میلادی (مثال: 2025/03/16)"><button id="toJalali">به شمسی</button></div><div id="jalaliResult"></div><button class="btn" onclick="renderMainMenu()">بازگشت</button></div>`; document.getElementById('content-area').innerHTML = html; document.getElementById('toGregorian').onclick = () => { document.getElementById('gregorianResult').innerHTML = "تبدیل دقیق نیاز به الگوریتم دارد. لطفاً از تقویم آنلاین کمک بگیرید."; }; document.getElementById('toJalali').onclick = () => { document.getElementById('jalaliResult').innerHTML = "تبدیل دقیق نیاز به الگوریتم دارد."; }; }
function printUserReport(userId){ let user = users.find(u=>u.id===userId); if(!user) return; let presentCount = Object.values(attendance).filter(day => day[user.username] === 'present').length; let userQuizzes = quizResults.filter(r=>r.userId===userId).map(q=>`${quizzes.find(qz=>qz.id===q.quizId)?.title||'بدون عنوان'}: ${q.score}`); let userTasks = tasks.filter(t=>t.completedBy.includes(userId)).map(t=>t.title); let win = window.open('', '_blank'); win.document.write(`<html dir="rtl"><head><title>کارنامه ${user.fullName}</title><style>body{font-family:sans-serif;padding:20px;} .card{max-width:600px;margin:auto;border:2px solid #2c7da0;border-radius:20px;padding:20px;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #ccc;padding:6px;}</style></head><body><div class="card"><h2 style="text-align:center;">کارنامه ${user.fullName}</h2><p><strong>نقش:</strong> ${user.role} | <strong>گروه:</strong> ${user.group||'—'} | <strong>امتیاز کل:</strong> ${user.score===Infinity?'∞':user.score}</p><h3>حضور و غیاب</h3><p>تعداد حضور: ${presentCount}</p><h3>آزمون‌ها</h3><p>${userQuizzes.join('<br>') || 'هیچ'}</p><h3>وظایف انجام شده</h3><p>${userTasks.join('<br>') || 'هیچ'}</p><h3>دستاوردها</h3><p>${(user.achievements||[]).map(a=>achievementsList.find(ac=>ac.id===a)?.title).join('<br>') || 'هیچ'}</p><div style="text-align:center; margin-top:20px;">تاریخ چاپ: ${new Date().toLocaleDateString('fa-IR')}</div></div></body></html>`); win.print(); win.close(); }
function openCamera(cb){ let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment'; inp.onchange=e=>{ if(e.target.files[0]){ let fr=new FileReader(); fr.onload=ev=>cb(ev.target.result); fr.readAsDataURL(e.target.files[0]); } }; inp.click(); }
function openGalleryUpload(cb){ let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>{ if(e.target.files[0]){ let fr=new FileReader(); fr.onload=ev=>cb(ev.target.result); fr.readAsDataURL(e.target.files[0]); } }; inp.click(); }
function getRandomEmoji(){ return ['😀','😎','🧒','👧','👦','👩','🧑','🐱','🦊','🐻','🌟','⭐'][Math.floor(Math.random()*12)]; }
function showProfileManager(){ let user = users.find(u=>u.id===currentUser.id); let html = `<div class="card"><h3>📸 پروفایل تصویری من</h3><div style="text-align:center;">${user.image ? `<img src="${user.image}" class="profile-img">` : `<div style="font-size:4rem;">${user.emoji || '🧒'}</div>`}</div><div class="flex"><button id="takePhotoBtn" class="btn">📷 دوربین</button><button id="uploadPhotoBtn" class="btn">🖼️ گالری</button><button id="setEmojiBtn" class="btn-warning">😀 ایموجی</button><button id="removePhotoBtn" class="btn-danger">🗑 حذف</button></div><hr><h4>اطلاعات من</h4><p><strong>نام:</strong> ${user.fullName}</p><p><strong>نقش:</strong> ${user.role}</p><p><strong>گروه:</strong> ${user.group||'ندارد'}</p><p><strong>امتیاز:</strong> ${user.score===Infinity?'∞':user.score}</p><hr><h4>🏆 دستاوردهای من</h4><div id="myAchievements"></div><hr><h4>📝 یادداشت شخصی</h4><textarea id="personalNote" rows="3">${user.personalNote || ''}</textarea><button id="saveNoteBtn" class="btn-success">💾 ذخیره یادداشت</button><div class="flex"><button id="viewMyActivityBtn" class="btn-purple">📜 فعالیت‌های من</button><button id="printMyReportBtn" class="btn-warning">🖨️ کارنامه من</button></div><hr><h4>🔗 کد معرف</h4><p>کد شما: <strong>${user.referralCode}</strong></p><p>تعداد معرفی‌ها: ${userReferrals[user.id] ? Object.keys(userReferrals[user.id]).length : 0}</p></div>`; document.getElementById('content-area').innerHTML = html; let achDiv = document.getElementById('myAchievements'); let earned = user.achievements || []; achDiv.innerHTML = achievementsList.map(ach => `<span class="achievement-badge" style="background:${earned.includes(ach.id)?'#f1c40f':'#95a5a6'};">${ach.title} ${earned.includes(ach.id)?'✅':'❌'}</span>`).join(''); document.getElementById('takePhotoBtn')?.addEventListener('click',()=> openCamera((img)=>{ user.image=img; user.emoji=null; saveToLocal(); showProfileManager(); })); document.getElementById('uploadPhotoBtn')?.addEventListener('click',()=> openGalleryUpload((img)=>{ user.image=img; user.emoji=null; saveToLocal(); showProfileManager(); })); document.getElementById('setEmojiBtn')?.addEventListener('click',()=>{ let em=prompt("ایموجی:",getRandomEmoji()); if(em){ user.emoji=em; user.image=null; saveToLocal(); showProfileManager(); } }); document.getElementById('removePhotoBtn')?.addEventListener('click',()=>{ user.image=null; user.emoji='🧒'; saveToLocal(); showProfileManager(); }); document.getElementById('saveNoteBtn')?.addEventListener('click',()=>{ user.personalNote = document.getElementById('personalNote').value; saveToLocal(); alert("یادداشت ذخیره شد"); }); document.getElementById('viewMyActivityBtn')?.addEventListener('click',()=> showUserActivity(currentUser.id)); document.getElementById('printMyReportBtn')?.addEventListener('click',()=> printUserReport(currentUser.id)); }
function printSmartCard(userId){ let user=users.find(u=>u.id===userId); if(!user) return; let roleMap={admin:'مدیر',deputy:'جانشین',prime_minister:'وزیر اعظم',interior_minister:'وزیر کشور',support_minister:'وزیر پشتیبانی',supreme_advisor:'مشاور اعظم',teen:'نوجوان',parent:'والد',governor:'فرماندار'}; let parent=users.find(p=>p.childrenIds?.includes(user.id)); let win=window.open('','_blank'); win.document.write(`<html dir="rtl"><head><title>کارت هوشمند ${user.fullName}</title><style>body{font-family:sans-serif;padding:20px;} .card{max-width:400px;margin:auto;border:2px solid #2c7da0;border-radius:28px;padding:20px;text-align:center;}</style></head><body><div class="card"><div class="header">🏛️ کانون فرهنگی هنری امیرالمومنین (ع)</div><div>${user.image?`<img src="${user.image}" style="width:80px;border-radius:50%;">`:`<div style="font-size:4rem;">${user.emoji||'🧑'}</div>`}</div><h3>${user.fullName}</h3><p>نقش: ${roleMap[user.role]}<br>نام کاربری: ${user.username}<br>امتیاز: ${user.score===Infinity?'∞':user.score}<br>والد: ${parent?parent.fullName:'—'}<br>گروه: ${user.group||'—'}</p><div>📅 ${new Date().toLocaleDateString('fa-IR')}</div></div></body></html>`); win.print(); win.close(); }

// ---------------------------- مدیریت کامل کاربران ----------------------------
function showManageUsers(){
    if(currentUser.role !== 'admin' && currentUser.role !== 'deputy') return alert('دسترسی غیرمجاز');
    let searchHtml = `<div class="flex"><input type="text" id="searchUser" placeholder="جستجو..."><select id="sortUsers"><option value="score">مرتب‌سازی بر اساس امتیاز</option><option value="name">بر اساس نام</option></select><button id="applySearchBtn" class="btn-success">اعمال</button></div>`;
    let html = `<h3>👥 مدیریت کاربران</h3>${searchHtml}<div id="usersList"></div><hr><h4>➕ افزودن کاربر جدید</h4><input id="nfn" placeholder="نام کامل"><input id="nun" placeholder="نام کاربری"><input id="npw" type="password"><select id="nrl"><option>teen</option><option>parent</option><option>deputy</option><option>governor</option><option>supreme_advisor</option><option>prime_minister</option><option>interior_minister</option><option>support_minister</option></select><select id="ngroup"><option value="">بدون گروه</option><option value="A">گروه A</option><option value="B">گروه B</option><option value="C">گروه C</option><option value="D">گروه D</option></select><button id="addUserBtn" class="btn-success">افزودن</button>`;
    document.getElementById('content-area').innerHTML = html;
    function renderUsersList(){
        let searchTerm = document.getElementById('searchUser')?.value.toLowerCase() || '';
        let sortType = document.getElementById('sortUsers')?.value || 'score';
        let filtered = users.filter(u => u.id !== 13 && (searchTerm === '' || u.fullName.toLowerCase().includes(searchTerm) || u.username.toLowerCase().includes(searchTerm)));
        if(sortType === 'score') filtered.sort((a,b)=>b.score - a.score);
        else filtered.sort((a,b)=>a.fullName.localeCompare(b.fullName));
        let listHtml = '';
        filtered.forEach(u => {
            let roleMap={admin:'مدیر',deputy:'جانشین',supreme_advisor:'مشاور اعظم',prime_minister:'وزیر اعظم',interior_minister:'وزیر کشور',support_minister:'وزیر پشتیبانی',teen:'نوجوان',parent:'والد',governor:'فرماندار'};
            listHtml += `<div class="user-row"><div><strong>${u.fullName}</strong> (${u.username}) - ${roleMap[u.role]||u.role}<br>⭐ امتیاز: ${u.score===Infinity?'∞':u.score} | گروه: ${u.group||'ندارد'}</div><div><select class="groupSelect" data-id="${u.id}"><option value="">بدون گروه</option><option value="A" ${u.group==='A'?'selected':''}>گروه A</option><option value="B" ${u.group==='B'?'selected':''}>گروه B</option><option value="C" ${u.group==='C'?'selected':''}>گروه C</option><option value="D" ${u.group==='D'?'selected':''}>گروه D</option></select><button class="btn-success" onclick="changeScore(${u.id},5)">+5</button><button class="btn-warning" onclick="changeScore(${u.id},-5)">-5</button>${u.id!==13?`<button class="btn-danger" onclick="deleteUser(${u.id})">🗑</button>`:''}<button class="btn" onclick="editUser(${u.id})">✏️</button><button class="btn-purple" onclick="printSmartCard(${u.id})">🖨️ پرینت</button><button class="btn" onclick="showUserAchievements(${u.id})">🏆</button><button class="btn" onclick="showUserActivity(${u.id})">📜</button><button class="btn-warning" onclick="printUserReport(${u.id})">📄</button></div></div>`;
        });
        document.getElementById('usersList').innerHTML = listHtml;
        document.querySelectorAll('.groupSelect').forEach(sel => {
            sel.addEventListener('change', (e) => {
                let uid = parseInt(sel.dataset.id);
                let u = users.find(u=>u.id===uid);
                if(u) { u.group = sel.value || null; saveToLocal(); renderUsersList(); }
            });
        });
    }
    renderUsersList();
    document.getElementById('addUserBtn').onclick = ()=>{
        let full=document.getElementById('nfn').value, uname=document.getElementById('nun').value, pwd=document.getElementById('npw').value, role=document.getElementById('nrl').value, group=document.getElementById('ngroup').value;
        if(!full||!uname||!pwd) return alert('همه فیلدها الزامی');
        if(users.find(u=>u.username===uname)) return alert('نام کاربری تکراری');
        let newId = Math.max(...users.map(u=>u.id))+1;
        users.push({ id:newId, username:uname, password:pwd, role, fullName:full, score:0, group:group||null, image:null, emoji:"🧑", childrenIds:null, personalNote:"", achievements:[], referralCode:`REF${newId}`, referredBy:null, classes:[], governorGroup:null });
        saveToLocal(); showManageUsers();
    };
    document.getElementById('applySearchBtn').onclick = ()=>{ renderUsersList(); };
}
function changeScore(uid,delta){
    let u=users.find(u=>u.id===uid);
    if(u){
        if(u.score === Infinity && delta<0) return alert('امتیاز مدیر ارشد قابل کاهش نیست');
        if(u.score === Infinity && delta>0) { u.score = Infinity; }
        else {
            let newScore = u.score + delta;
            if(newScore < 0) newScore = 0;
            u.score = newScore;
        }
        saveToLocal();
        if(currentUser.id===uid) currentUser.score=u.score;
        checkAndGrantAchievements(uid);
        if(document.getElementById('usersList')) showManageUsers();
        else renderMainMenu();
        updateWelcome();
    }
}
function deleteUser(uid){ if(uid===13) return alert('حذف مدیر ارشد مجاز نیست'); users=users.filter(u=>u.id!==uid); saveToLocal(); if(document.getElementById('usersList')) showManageUsers(); else renderMainMenu(); }
function editUser(uid){
    let u=users.find(u=>u.id===uid); if(!u) return;
    let newName=prompt("نام کاربری جدید:",u.username); if(newName) u.username=newName.trim();
    let newPass=prompt("رمز جدید:",u.password); if(newPass) u.password=newPass.trim();
    if(u.role==='parent'){ let ids=prompt("شناسه فرزندان (با کاما):",u.childrenIds?.join(',')||''); if(ids!==null) u.childrenIds=ids.split(',').map(n=>parseInt(n.trim())).filter(n=>!isNaN(n)); }
    if(u.role==='governor'){ let g=prompt("گروه زیرمجموعه (مثلاً G1):",u.governorGroup||''); if(g!==null) u.governorGroup=g; }
    saveToLocal(); if(document.getElementById('usersList')) showManageUsers(); else renderMainMenu();
}

// ---------------------------- برنامه‌ها و معماها ----------------------------
function showPrograms(){ let progText = programs.map(p=>`📌 ${p.name} (${p.date} ${p.time})\n${p.desc} ${p.repeat ? `تکرار: ${p.repeat}` : ''}`).join('\n\n'); alert(progText || 'هیچ برنامه‌ای وجود ندارد'); }
function showManagePrograms(){
    if(currentUser.role !== 'admin' && currentUser.role !== 'deputy') return;
    let html = `<h3>📅 برنامه‌ها</h3>`;
    programs.forEach((p,i)=>{ html+=`<div class="card"><b>${p.name}</b> (${p.date} ${p.time})<br>${p.desc}<br>تکرار: ${p.repeat || 'ندارد'}<button class="btn-danger" data-pidx="${i}">حذف</button></div>`; });
    html+=`<hr><h4>افزودن برنامه جدید</h4><input id="pn" placeholder="نام"><input id="pd" placeholder="تاریخ (مثلاً 1404/02/10)"><input id="pt" placeholder="ساعت"><input id="pdesc" placeholder="توضیحات"><select id="prepeat"><option value="">بدون تکرار</option><option value="weekly">هفتگی</option><option value="monthly">ماهانه</option></select><button id="addProgBtn" class="btn-success">افزودن</button>`;
    document.getElementById('content-area').innerHTML = html;
    document.querySelectorAll('[data-pidx]').forEach(btn=>btn.onclick=()=>{ programs.splice(parseInt(btn.dataset.pidx),1); saveToLocal(); showManagePrograms(); showReminder(); });
    document.getElementById('addProgBtn').onclick = ()=>{
        let name=document.getElementById('pn').value.trim(); if(!name) return;
        let newProg = { name, date:document.getElementById('pd').value, time:document.getElementById('pt').value, desc:document.getElementById('pdesc').value, repeat:document.getElementById('prepeat').value };
        programs.push(newProg); saveToLocal(); showManagePrograms(); showReminder();
        addNotification(currentUser.id, "برنامه جدید", `برنامه "${name}" اضافه شد.`, "programs");
    };
}
function showSolvePuzzles(){
    if(!puzzles.length) return alert('معمایی نیست');
    let html = `<h3>🔓 حل معماها</h3>`;
    puzzles.forEach((p,idx)=>{
        let already = solvedPuzzles.some(sp=>sp.userId===currentUser.id && sp.puzzleId===idx);
        html += `<div class="card"><b>${idx+1}. ${p.question}</b> (${p.points})<br>${!already?`<input id="a${idx}" placeholder="پاسخ"><button class="btn-success" data-idx="${idx}">بررسی</button>`:'✅ حل شده'}</div>`;
    });
    document.getElementById('content-area').innerHTML = html;
    document.querySelectorAll('[data-idx]').forEach(btn=>{
        btn.onclick = ()=>{
            let idx=parseInt(btn.dataset.idx);
            let ans=document.getElementById(`a${idx}`).value.trim().toLowerCase();
            if(ans===puzzles[idx].answer){
                if(solvedPuzzles.some(sp=>sp.userId===currentUser.id && sp.puzzleId===idx)) return;
                currentUser.score += puzzles[idx].points;
                let u=users.find(u=>u.id===currentUser.id); if(u) u.score=currentUser.score;
                solvedPuzzles.push({ userId:currentUser.id, puzzleId:idx });
                saveToLocal();
                addActivityLog(currentUser.id, "حل معما", `معمای ${puzzles[idx].question} با موفقیت حل شد. +${puzzles[idx].points} امتیاز`);
                checkAndGrantAchievements(currentUser.id);
                alert(`✅ صحیح! +${puzzles[idx].points} امتیاز`);
                showSolvePuzzles(); updateWelcome();
            } else alert('پاسخ نادرست');
        };
    });
}
function showManagePuzzles(){
    if(currentUser.role !== 'admin' && currentUser.role !== 'deputy') return;
    let html = `<h3>🧩 مدیریت معماها</h3>`;
    puzzles.forEach((p,i)=>{ html+=`<div class="user-row"><div>${i+1}. ${p.question} (${p.points})</div><button class="btn-danger" data-pid="${i}">حذف</button></div>`; });
    html+=`<hr><h4>➕ افزودن معما</h4><input id="pq" placeholder="سوال"><input id="pa" placeholder="پاسخ"><input id="pp" placeholder="امتیاز" value="10"><button id="addPuzBtn" class="btn-success">افزودن</button>`;
    document.getElementById('content-area').innerHTML = html;
    document.querySelectorAll('[data-pid]').forEach(b=>b.onclick=()=>{ puzzles.splice(parseInt(b.dataset.pid),1); saveToLocal(); showManagePuzzles(); });
    document.getElementById('addPuzBtn').onclick = ()=>{ let q=document.getElementById('pq').value.trim(), a=document.getElementById('pa').value.trim().toLowerCase(), pts=parseInt(document.getElementById('pp').value)||10; if(q&&a) puzzles.push({question:q, answer:a, points:pts}); saveToLocal(); showManagePuzzles(); };
}

function levenshteinDistance(a,b){ /* همان */ if(a.length===0) return b.length; if(b.length===0) return a.length; let matrix=[]; for(let i=0;i<=b.length;i++) matrix[i]=[i]; for(let j=0;j<=a.length;j++) matrix[0][j]=j; for(let i=1;i<=b.length;i++){ for(let j=1;j<=a.length;j++){ if(b.charAt(i-1)===a.charAt(j-1)) matrix[i][j]=matrix[i-1][j-1]; else matrix[i][j]=Math.min(matrix[i-1][j-1]+1, matrix[i][j-1]+1, matrix[i-1][j]+1); } } return matrix[b.length][a.length]; }
function findBestPattern(input){ input=input.trim().toLowerCase(); let bestMatch=null, bestDist=3; for(let p of chatbotPatterns){ let dist=levenshteinDistance(input, p.pattern.toLowerCase()); if(dist<bestDist){ bestDist=dist; bestMatch=p; } } return bestMatch; }
function chatReply(inp){ inp=inp.trim().toLowerCase(); if(inp.startsWith('یاد بگیر')){ let parts=inp.slice(8).split('='); if(parts.length===2){ chatMemory.learned[parts[0].trim()]=parts[1].trim(); saveToLocal(); return `یاد گرفتم: "${parts[0].trim()}"`; } return 'فرمان: یاد بگیر کلید = مقدار'; } let best=findBestPattern(inp); if(best){ let response=best.response; if(response.includes('{{score}}')) response=response.replace('{{score}}', currentUser.score===Infinity?'∞':currentUser.score); return response; } for(let k in chatMemory.learned) if(inp.includes(k)) return chatMemory.learned[k]; return 'متوجه نشدم. با «یاد بگیر» به من بیاموز.'; }
function importChatbotJSON(){ let inp=document.createElement('input'); inp.type='file'; inp.accept='application/json'; inp.onchange=e=>{ let f=e.target.files[0]; if(!f) return; let fr=new FileReader(); fr.onload=ev=>{ try{ let d=JSON.parse(ev.target.result); if(d.patterns) chatbotPatterns=d.patterns; alert("داده‌های چت‌بات با موفقیت بارگذاری شد."); } catch(e){ alert("فایل JSON نامعتبر"); } }; fr.readAsText(f); }; inp.click(); }
function showChat(){ let area=document.getElementById('content-area'); area.innerHTML=`<div class="card"><div class="flex"><button id="importChatBtn" class="btn-purple">📂 بارگذاری JSON چت‌بات</button></div><div id="chatlog" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px; border-radius:20px; margin-bottom:10px;"></div><div class="flex"><input id="chatinput" placeholder="سوال..."><button id="chatsend" class="btn-success">ارسال</button></div></div>`; let log=document.getElementById('chatlog'); let add=(txt,isUser)=>{ let d=document.createElement('div'); d.style.textAlign=isUser?'left':'right'; d.style.margin='8px'; d.style.background=isUser?'#e2f0ff':'#f0f0f0'; d.style.padding='8px'; d.style.borderRadius='16px'; d.innerHTML=isUser?`<b>شما:</b> ${txt}`:`<b>یار مهربان:</b> ${txt}`; log.appendChild(d); log.scrollTop=log.scrollHeight; }; let input=document.getElementById('chatinput'); let send=()=>{ let msg=input.value.trim(); if(!msg) return; add(msg,true); add(chatReply(msg),false); input.value=''; }; document.getElementById('chatsend').onclick=send; document.getElementById('importChatBtn').onclick=()=>importChatbotJSON(); input.onkeypress=e=>{ if(e.key==='Enter') send(); }; add('سلام! من یار مهربان هستم. می‌توانید سوال بپرسید یا با «یاد بگیر کلید = مقدار» به من آموزش دهید.',false); }

function manageQuizzes(){ if(currentUser.role !== 'admin' && currentUser.role !== 'deputy') return; let html=`<div class="card"><h3>📝 مدیریت آزمون</h3><div class="flex"><label>⏱️ زمان (دقیقه):</label><input type="number" id="examTimeLimit" value="${examSettings.timeLimit}" style="width:80px;"><button id="saveTimeBtn" class="btn-success">ذخیره</button></div><button id="newQuizBtn" class="btn-success">➕ آزمون جدید</button><div id="qlist"></div></div>`; document.getElementById('content-area').innerHTML=html; document.getElementById('saveTimeBtn').onclick=()=>{ let t=parseInt(document.getElementById('examTimeLimit').value); if(t>0){ examSettings.timeLimit=t; saveToLocal(); alert('ذخیره شد'); } }; document.getElementById('newQuizBtn').onclick=()=>{ let title=prompt('عنوان آزمون:'); if(title){ quizzes.push({ id:Date.now(), title, questions:[] }); saveToLocal(); manageQuizzes(); } }; let listDiv=document.getElementById('qlist'); listDiv.innerHTML=''; quizzes.forEach(q=>{ let div=document.createElement('div'); div.className='card'; div.innerHTML=`<b>📌 ${q.title}</b> <button class="btn-warning" data-qid="${q.id}">➕ سوال</button> <button class="btn-danger" data-del="${q.id}">حذف</button><div id="qs-${q.id}"></div>`; listDiv.appendChild(div); let qsDiv=div.querySelector(`#qs-${q.id}`); q.questions.forEach((qs,idx)=>{ let qsd=document.createElement('div'); qsd.className='card'; qsd.innerHTML=`<b>${idx+1}. ${qs.text}</b> (${qs.type})<br>پاسخ: ${qs.answer}<br><button class="btn-danger" data-qid="${q.id}" data-qidx="${idx}">حذف سوال</button>`; qsDiv.appendChild(qsd); }); div.querySelector('[data-qid]').onclick=()=>addQuestionToQuiz(q.id); div.querySelector('[data-del]').onclick=()=>{ quizzes=quizzes.filter(qq=>qq.id!==q.id); saveToLocal(); manageQuizzes(); }; }); }

if(activeQuizTimer) clearInterval(activeQuizTimer); let total=0; for(let i=0;i<quiz.questions.length;i++){ let q=quiz.questions[i]; let userAns; if(q.type==='choice'){ let sel=document.querySelector(`input[name="q${i}"]:checked`); userAns=sel?sel.value:''; } else userAns=document.querySelector(`textarea[name="q${i}"]`).value; if(userAns.trim().toLowerCase()===q.answer.toLowerCase()) total+=q.points; } quizResults.push({ userId:currentUser.id, quizId:quiz.id, score:total, date:new Date().toLocaleString() }); saveToLocal(); addActivityLog(currentUser.id, "شرکت در آزمون", `آزمون ${quiz.title} با نمره ${total} از ${quiz.questions.reduce((s,q)=>s+q.points,0)}`); checkAndGrantAchievements(currentUser.id); alert(`نمره: ${total} / ${quiz.questions.reduce((s,q)=>s+q.points,0)}`); renderMainMenu(); }; }; }

function showSendMessage(){ let recs=users.filter(u=>u.id!==currentUser.id); if(!recs.length) return; let html=`<h3>📨 ارسال پیام</h3><select id="toId">${recs.map(r=>`<option value="${r.id}">${r.fullName} (${r.role})</option>`).join('')}</select><textarea id="msgText" rows="3"></textarea><button id="sendMsgBtn" class="btn-success">ارسال</button>`; document.getElementById('content-area').innerHTML=html; document.getElementById('sendMsgBtn').onclick=()=>{ let toId=parseInt(document.getElementById('toId').value); let text=document.getElementById('msgText').value.trim(); if(!text) return; messages.push({ id:Date.now(), fromId:currentUser.id, toId, text, date:new Date().toLocaleString(), isRead:false }); saveToLocal(); addNotification(toId, "پیام جدید", `از طرف ${currentUser.fullName}: ${text.substring(0,50)}...`, ""); alert('پیام ارسال شد'); renderMainMenu(); }; }
function showMessages(){ let relevant=messages.filter(m=>m.fromId===currentUser.id || m.toId===currentUser.id); if(!relevant.length){ alert('هیچ پیامی نیست'); return; } let html=`<h3>📬 پیام‌ها</h3>`; relevant.forEach(m=>{ let sender=users.find(u=>u.id===m.fromId); let receiver=users.find(u=>u.id===m.toId); let isMine=m.toId===currentUser.id; html+=`<div class="card"><div>${isMine?`از: ${sender.fullName}`:`به: ${receiver.fullName}`}</div><div>${m.date}</div><div>${m.text}</div></div>`; }); document.getElementById('content-area').innerHTML=html; }
function showParentPanel(){ if(currentUser.role!=='parent') return alert('دسترسی محدود به والدین'); let children=users.filter(u=>currentUser.childrenIds?.includes(u.id)); if(!children.length){ alert('هیچ فرزندی برای شما ثبت نشده است'); return; } let html=`<h3>👪 وضعیت فرزندان</h3>`; children.forEach(child=>{ let childResults=quizResults.filter(r=>r.userId===child.id); let attList=Object.entries(attendance).map(([d,obj])=>({date:d,status:obj[child.username]})).filter(a=>a.status); html+=`<div class="card"><h4>${child.fullName}</h4><p>⭐ امتیاز: ${child.score===Infinity?'∞':child.score}</p><p>📝 نمرات آزمون: ${childResults.map(r=>r.score).join(', ')||'هیچ'}</p><p>📋 حضور: ${attList.map(a=>`${a.date}: ${a.status==='present'?'حاضر':'غایب'}`).join(' , ')||'ثبتی نیست'}</p><textarea id="fb_${child.id}" rows="2" placeholder="بازخورد خود را برای مربیان بنویسید..."></textarea><button class="btn-success" data-child="${child.id}">ارسال بازخورد</button><hr><h5>پاسخ مربیان:</h5><div id="replies_${child.id}">`; let replies=parentFeedbacks.filter(fb=>fb.childId===child.id && fb.reply); if(replies.length) replies.forEach(r=>html+=`<div><strong>پاسخ:</strong> ${r.reply} (${r.replyDate})</div>`); else html+=`<div>هیچ پاسخی ثبت نشده است.</div>`; html+=`</div></div>`; }); document.getElementById('content-area').innerHTML=html; document.querySelectorAll('[data-child]').forEach(btn=>{ btn.onclick=()=>{ let childId=parseInt(btn.dataset.child); let msg=document.getElementById(`fb_${childId}`).value.trim(); if(!msg) return; parentFeedbacks.push({ parentId:currentUser.id, childId, message:msg, date:new Date().toLocaleString(), reply:null, replyDate:null }); saveToLocal(); alert('بازخورد شما با موفقیت ثبت شد'); showParentPanel(); addNotification(1, "بازخورد والدین", `بازخورد جدید از ${currentUser.fullName} برای ${users.find(u=>u.id===childId)?.fullName}: ${msg.substring(0,50)}...`, "parentFeedback"); }; }); }
function manageParentFeedbacks(){ if(currentUser.role !== 'admin' && currentUser.role !== 'deputy') return alert('فقط مدیر و جانشین'); let pending=parentFeedbacks.filter(fb=>!fb.reply); if(!pending.length){ alert('هیچ بازخورد پاسخ داده نشده‌ای وجود ندارد'); return; } let html=`<h3>📝 پاسخ به بازخورد والدین</h3>`; pending.forEach((fb,idx)=>{ let parent=users.find(u=>u.id===fb.parentId); let child=users.find(u=>u.id===fb.childId); html+=`<div class="card"><div><strong>از: ${parent?.fullName}</strong> درباره ${child?.fullName}</div><div>${fb.message}</div><div>تاریخ: ${fb.date}</div><textarea id="reply_${idx}" rows="2" placeholder="پاسخ خود را بنویسید..."></textarea><button class="btn-success" data-idx="${idx}">ارسال پاسخ</button></div>`; }); document.getElementById('content-area').innerHTML=html; document.querySelectorAll('[data-idx]').forEach(btn=>{ btn.onclick=()=>{ let idx=parseInt(btn.dataset.idx); let reply=document.getElementById(`reply_${idx}`).value.trim(); if(!reply) return; parentFeedbacks[idx].reply=reply; parentFeedbacks[idx].replyDate=new Date().toLocaleString(); saveToLocal(); addNotification(parentFeedbacks[idx].parentId, "پاسخ به بازخورد شما", `پاسخ مدیر: ${reply.substring(0,50)}...`, ""); alert("پاسخ ذخیره شد"); manageParentFeedbacks(); }; }); }

// ---------------------------- نظرسنجی و وظایف ----------------------------
function showPollManagement(){ if(currentUser.role !== 'admin' && currentUser.role !== 'deputy') return alert('فقط مدیر و جانشین'); let html=`<div class="card"><h3>📊 نظرسنجی‌ها</h3><button id="newPollBtn" class="btn-success">➕ نظرسنجی جدید</button><div id="pollsList"></div></div>`; document.getElementById('content-area').innerHTML=html; document.getElementById('newPollBtn').onclick=()=>{ let q=prompt("سوال نظرسنجی:"); if(!q) return; let opts=prompt("گزینه‌ها (با کاما جدا کنید):"); let options=opts?opts.split(',').map(s=>s.trim()):[]; if(options.length<2) return alert("حداقل دو گزینه لازم است"); polls.push({ id:Date.now(), question:q, options:options, votes:[], active:true }); saveToLocal(); showPollManagement(); addNotification(null, "نظرسنجی جدید", `نظرسنجی "${q}" فعال شد`, "polls"); }; function renderPolls(){ let listDiv=document.getElementById('pollsList'); listDiv.innerHTML=''; polls.forEach(p=>{ let totalVotes=p.votes.length; let resultsHtml=p.options.map((opt,idx)=>{ let count=p.votes.filter(v=>v.optionIndex===idx).length; let percent=totalVotes?(count/totalVotes*100).toFixed(1):0; return `<div>${opt}: ${count} رأی (${percent}%)</div>`; }).join(''); listDiv.innerHTML+=`<div class="card"><div><strong>${p.question}</strong> ${p.active?'(فعال)':'(غیرفعال)'}</div><div>${resultsHtml}</div><button class="btn-warning" data-id="${p.id}" data-toggle="active">${p.active?'غیرفعال کردن':'فعال کردن'}</button><button class="btn-danger" data-id="${p.id}" data-delete="true">حذف</button></div>`; }); document.querySelectorAll('[data-toggle]').forEach(btn=>{ btn.onclick=()=>{ let pid=parseInt(btn.dataset.id); let poll=polls.find(p=>p.id===pid); if(poll) poll.active=!poll.active; saveToLocal(); renderPolls(); }; }); document.querySelectorAll('[data-delete]').forEach(btn=>{ btn.onclick=()=>{ let pid=parseInt(btn.dataset.id); polls=polls.filter(p=>p.id!==pid); saveToLocal(); renderPolls(); }; }); } renderPolls(); }
function voteInPoll(){ let activePolls=polls.filter(p=>p.active); if(!activePolls.length){ alert("هیچ نظرسنجی فعالی وجود ندارد"); return; } let html=`<h3>🗳️ شرکت در نظرسنجی</h3>`; activePolls.forEach(p=>{ let alreadyVoted=p.votes.some(v=>v.userId===currentUser.id); html+=`<div class="card"><div><strong>${p.question}</strong></div>`; p.options.forEach((opt,idx)=>{ if(alreadyVoted) html+=`<div>${opt}</div>`; else html+=`<button class="btn" data-poll="${p.id}" data-opt="${idx}">${opt}</button> `; }); if(alreadyVoted) html+=`<div>✅ شما قبلاً در این نظرسنجی شرکت کرده‌اید.</div>`; html+=`</div>`; }); document.getElementById('content-area').innerHTML=html; document.querySelectorAll('[data-poll]').forEach(btn=>{ btn.onclick=()=>{ let pid=parseInt(btn.dataset.poll); let optIdx=parseInt(btn.dataset.opt); let poll=polls.find(p=>p.id===pid); if(poll && !poll.votes.some(v=>v.userId===currentUser.id)){ poll.votes.push({ userId:currentUser.id, optionIndex:optIdx }); saveToLocal(); addActivityLog(currentUser.id, "شرکت در نظرسنجی", `نظرسنجی "${poll.question}" - گزینه ${poll.options[optIdx]}`); alert("رأی شما ثبت شد"); voteInPoll(); } else alert("شما قبلاً رأی داده‌اید یا نظرسنجی نامعتبر"); }; }); }
function showTaskManagement(){ if(currentUser.role !== 'admin' && currentUser.role !== 'deputy') return alert('فقط مدیر و جانشین'); let html=`<div class="card"><h3>📋 وظایف</h3><button id="newTaskBtn" class="btn-success">➕ وظیفه جدید</button><div id="tasksList"></div></div>`; document.getElementById('content-area').innerHTML=html; document.getElementById('newTaskBtn').onclick=()=>{ let title=prompt("عنوان وظیفه:"); if(!title) return; let desc=prompt("توضیحات:"); let points=parseInt(prompt("امتیاز:"))||5; let deadline=prompt("مهلت (تاریخ مثلاً 1404/02/20):"); tasks.push({ id:Date.now(), title, description:desc, points, deadline, completedBy:[] }); saveToLocal(); showTaskManagement(); addNotification(null, "وظیفه جدید", `وظیفه "${title}" با امتیاز ${points} ایجاد شد`, "tasks"); }; function renderTasks(){ let listDiv=document.getElementById('tasksList'); listDiv.innerHTML=''; tasks.forEach(t=>{ let completedCount=t.completedBy.length; listDiv.innerHTML+=`<div class="card"><div><strong>${t.title}</strong> (امتیاز: ${t.points}) مهلت: ${t.deadline||'نامشخص'}</div><div>${t.description||''}</div><div>تکمیل شده توسط: ${completedCount} نفر</div><button class="btn-danger" data-id="${t.id}" data-delete="true">حذف وظیفه</button></div>`; }); document.querySelectorAll('[data-delete]').forEach(btn=>{ btn.onclick=()=>{ let tid=parseInt(btn.dataset.id); tasks=tasks.filter(t=>t.id!==tid); saveToLocal(); renderTasks(); }; }); } renderTasks(); }
function showTasksForUser(){ let activeTasks=tasks.filter(t=>!t.completedBy.includes(currentUser.id)); if(!activeTasks.length){ alert("هیچ وظیفه‌ای برای انجام ندارید"); return; } let html=`<h3>📋 وظایف من</h3>`; activeTasks.forEach(t=>{ html+=`<div class="card"><div><strong>${t.title}</strong> (امتیاز: ${t.points}) - مهلت: ${t.deadline||'نامشخص'}</div><div>${t.description||''}</div><button class="btn-success" data-id="${t.id}">✅ انجام دادم</button></div>`; }); document.getElementById('content-area').innerHTML=html; document.querySelectorAll('[data-id]').forEach(btn=>{ btn.onclick=()=>{ let tid=parseInt(btn.dataset.id); let task=tasks.find(t=>t.id===tid); if(task && !task.completedBy.includes(currentUser.id)){ task.completedBy.push(currentUser.id); currentUser.score += task.points; let u=users.find(u=>u.id===currentUser.id); if(u) u.score=currentUser.score; saveToLocal(); addActivityLog(currentUser.id, "انجام وظیفه", `وظیفه "${task.title}" انجام شد. +${task.points} امتیاز`); checkAndGrantAchievements(currentUser.id); alert(`✅ وظیفه انجام شد! +${task.points} امتیاز`); showTasksForUser(); updateWelcome(); } }; }); }

// ---------------------------- آمار، گالری، کلاس‌ها ----------------------------
function showGroupStats(){ if(currentUser.role !== 'admin' && currentUser.role !== 'deputy') return alert('فقط مدیر و جانشین'); let groups={}; users.forEach(u=>{ if(u.group && u.role!=='admin'){ if(!groups[u.group]) groups[u.group]=[]; groups[u.group].push(u); } }); let html=`<h3>📊 آمار گروه‌ها (نمودار متنی)</h3>`; for(let g in groups){ let members=groups[g]; let avgScore=members.reduce((s,u)=>s+u.score,0)/members.length; let totalPresent=0, totalDays=Object.keys(attendance).length; members.forEach(u=>{ let presentCount=Object.values(attendance).filter(day=>day[u.username]==='present').length; totalPresent+=presentCount; }); let attendancePercent=totalDays?(totalPresent/(members.length*totalDays)*100).toFixed(1):0; let scoreBar="█".repeat(Math.floor(avgScore/100))+"░".repeat(Math.max(0,10-Math.floor(avgScore/100))); let attBar="█".repeat(Math.floor(attendancePercent/10))+"░".repeat(Math.max(0,10-Math.floor(attendancePercent/10))); html+=`<div class="card"><h4>گروه ${g}</h4><p>تعداد اعضا: ${members.length}</p><p>میانگین امتیاز: ${avgScore.toFixed(1)} <span style="font-family:monospace;">${scoreBar}</span></p><p>درصد حضور: ${attendancePercent}% <span style="font-family:monospace;">${attBar}</span></p></div>`; } document.getElementById('content-area').innerHTML=html; }
function showGallery(){ let html=`<div class="card"><h3>🖼️ گالری تصاویر کانون</h3><div class="flex" id="galleryImages"></div>`; if(currentUser.role==='admin' || currentUser.role==='deputy'){ html+=`<hr><button id="addGalleryImageBtn" class="btn-success">➕ افزودن تصویر جدید</button>`; } html+=`<button class="btn" onclick="renderMainMenu()">بازگشت</button></div>`; document.getElementById('content-area').innerHTML=html; let galleryDiv=document.getElementById('galleryImages'); gallery.forEach(img=>{ galleryDiv.innerHTML+=`<div style="position:relative;"><img src="${img.url}" class="gallery-image" title="${img.title||''}"><br><small>${img.date}</small>${(currentUser.role==='admin'||currentUser.role==='deputy')?`<button class="btn-danger" data-id="${img.id}" style="position:absolute;top:0;left:0;">✖</button>`:''}</div>`; }); if(currentUser.role==='admin' || currentUser.role==='deputy'){ document.getElementById('addGalleryImageBtn').onclick=()=>{ openGalleryUpload((url)=>{ let title=prompt("عنوان تصویر:"); gallery.push({ id:Date.now(), url, title:title||"بدون عنوان", date:new Date().toLocaleDateString('fa-IR') }); saveToLocal(); showGallery(); }); }; document.querySelectorAll('[data-id]').forEach(btn=>{ btn.onclick=()=>{ let id=parseInt(btn.dataset.id); gallery=gallery.filter(img=>img.id!==id); saveToLocal(); showGallery(); }; }); } }
function showClassManagement(){ if(currentUser.role !== 'admin' && currentUser.role !== 'deputy') return alert('فقط مدیر و جانشین'); let html=`<div class="card"><h3>📚 مدیریت کلاس‌ها</h3><button id="addClassBtn" class="btn-success">➕ کلاس جدید</button><div id="classesList"></div></div>`; document.getElementById('content-area').innerHTML=html; function renderClasses(){ let listDiv=document.getElementById('classesList'); listDiv.innerHTML=''; classes.forEach(c=>{ listDiv.innerHTML+=`<div class="card class-card"><div><strong>${c.name}</strong> - مدرس: ${c.teacher} - زمان: ${c.schedule}</div><div>ثبت‌نام‌شدگان: ${c.students.length} نفر</div><div class="flex"><button class="btn-warning" data-id="${c.id}" data-edit="true">✏️ ویرایش</button><button class="btn-info" data-id="${c.id}" data-students="true">مدیریت دانش‌آموزان</button><button class="btn-purple" data-id="${c.id}" data-grades="true">مدیریت نمرات</button><button class="btn-danger" data-id="${c.id}" data-delete="true">حذف</button></div></div>`; }); document.querySelectorAll('[data-edit]').forEach(btn=>{ btn.onclick=()=>{ let cid=parseInt(btn.dataset.id); let c=classes.find(c=>c.id===cid); let newName=prompt("نام کلاس:",c.name); if(newName) c.name=newName; let newTeacher=prompt("نام مدرس:",c.teacher); if(newTeacher) c.teacher=newTeacher; let newSchedule=prompt("زمان (روز و ساعت):",c.schedule); if(newSchedule) c.schedule=newSchedule; saveToLocal(); renderClasses(); }; }); document.querySelectorAll('[data-students]').forEach(btn=>{ btn.onclick=()=>{ let cid=parseInt(btn.dataset.id); let c=classes.find(c=>c.id===cid); let allTeens=users.filter(u=>u.role==='teen'); let html2=`<div class="card"><h3>مدیریت دانش‌آموزان کلاس ${c.name}</h3>`; allTeens.forEach(u=>{ let isEnrolled=c.students.includes(u.id); html2+=`<div class="user-row"><div>${u.fullName}</div><div><button class="btn${isEnrolled?'-danger':' success'}" data-user="${u.id}" data-enroll="${!isEnrolled}">${isEnrolled?'لغو ثبت‌نام':'ثبت‌نام'}</button></div></div>`; }); html2+=`<button class="btn" onclick="showClassManagement()">بازگشت</button></div>`; document.getElementById('content-area').innerHTML=html2; document.querySelectorAll('[data-enroll]').forEach(btn2=>{ btn2.onclick=()=>{ let uid=parseInt(btn2.dataset.user); let enroll=btn2.dataset.enroll==='true'; if(enroll && !c.students.includes(uid)) c.students.push(uid); else if(!enroll && c.students.includes(uid)) c.students=c.students.filter(id=>id!==uid); saveToLocal(); btn2.onclick(); }; }); }; }); document.querySelectorAll('[data-grades]').forEach(btn=>{ btn.onclick=()=>{ let cid=parseInt(btn.dataset.id); let c=classes.find(c=>c.id===cid); let students=c.students.map(uid=>users.find(u=>u.id===uid)).filter(s=>s); let html3=`<div class="card"><h3>مدیریت نمرات کلاس ${c.name}</h3>`; students.forEach(s=>{ let grade=c.grades.find(g=>g.userId===s.id); html3+=`<div class="user-row"><div>${s.fullName}</div><input type="number" id="grade_${s.id}" value="${grade?.score||''}" placeholder="نمره"><input type="text" id="comment_${s.id}" value="${grade?.comment||''}" placeholder="توضیح"><button class="btn-success" data-user="${s.id}">ذخیره نمره</button></div>`; }); html3+=`<button class="btn" onclick="showClassManagement()">بازگشت</button></div>`; document.getElementById('content-area').innerHTML=html3; document.querySelectorAll('[data-user]').forEach(btn3=>{ btn3.onclick=()=>{ let uid=parseInt(btn3.dataset.user); let score=parseFloat(document.getElementById(`grade_${uid}`).value); let comment=document.getElementById(`comment_${uid}`).value; if(!isNaN(score)){ let existing=c.grades.find(g=>g.userId===uid); if(existing){ existing.score=score; existing.comment=comment; existing.date=new Date().toLocaleDateString(); } else c.grades.push({ userId:uid, score, comment, date:new Date().toLocaleDateString() }); saveToLocal(); alert("نمره ذخیره شد"); } }; }); }; }); document.querySelectorAll('[data-delete]').forEach(btn=>{ btn.onclick=()=>{ let cid=parseInt(btn.dataset.id); classes=classes.filter(c=>c.id!==cid); saveToLocal(); renderClasses(); }; }); } renderClasses(); document.getElementById('addClassBtn').onclick=()=>{ let name=prompt("نام کلاس:"); if(!name) return; let teacher=prompt("نام مدرس:"); let schedule=prompt("زمان برگزاری (مثلاً شنبه ۱۴-۱۶):"); classes.push({ id:Date.now(), name, teacher, schedule, students:[], grades:[] }); saveToLocal(); renderClasses(); }; }
function showMyClasses(){ let myClasses=classes.filter(c=>c.students.includes(currentUser.id) || currentUser.role==='admin' || currentUser.role==='deputy' || (currentUser.role==='parent' && currentUser.childrenIds?.some(cid=>c.students.includes(cid)))); if(myClasses.length===0 && currentUser.role!=='admin' && currentUser.role!=='deputy'){ alert("شما در هیچ کلاسی ثبت‌نام نشده‌اید"); return; } let html=`<div class="card"><h3>📚 کلاس‌های من</h3>`; myClasses.forEach(c=>{ html+=`<div class="class-card"><h4>${c.name}</h4><p>مدرس: ${c.teacher}</p><p>زمان: ${c.schedule}</p>`; if(currentUser.role==='admin' || currentUser.role==='deputy' || currentUser.role==='parent'){ let students=c.students.map(uid=>users.find(u=>u.id===uid)).filter(s=>s); html+=`<p>دانش‌آموزان: ${students.map(s=>s.fullName).join(', ')}</p>`; } let myGrade=c.grades.find(g=>g.userId===currentUser.id); if(myGrade) html+=`<p>نمره من: ${myGrade.score} (${myGrade.comment||''}) - تاریخ: ${myGrade.date}</p>`; else if(currentUser.role==='teen') html+=`<p>نمره‌ای ثبت نشده است.</p>`; html+=`</div>`; }); html+=`<button class="btn" onclick="renderMainMenu()">بازگشت</button></div>`; document.getElementById('content-area').innerHTML=html; }

// ---------------------------- بازی‌ها ----------------------------
function getNewQ(level){ let bank=qMap[level]; return {...bank[Math.floor(Math.random()*bank.length)]}; }
function najatTimer(){ if(najatState.timerInt) clearInterval(najatState.timerInt); najatState.timer=20; najatState.timerInt = setInterval(()=>{ if(najatState.stage!=="playing") return; if(najatState.timer<=0){ clearInterval(najatState.timerInt); najatTimeout(); } else{ najatState.timer--; let d=document.getElementById("najatTimer"); if(d) d.innerText=`⏱️ ${najatState.timer} ثانیه`; } },1000); }
function najatTimeout(){ let p = najatState.players[najatState.currentPlayer]; p.health--; if(p.health<=0) p.isAlive=false; najatState.players = najatState.players.filter(p=>p.isAlive); if(najatState.players.length===0){ najatGameOver(); return; } najatState.currentPlayer = (najatState.currentPlayer+1)%najatState.players.length; najatTimer(); saveToLocal(); renderNajat(); }
function handleNajatAnswer(selected){ if(najatState.stage!=="playing") return; let q = najatState.currentQ; let p = najatState.players[najatState.currentPlayer]; if(selected===q.correct){ p.score+=10; najatState.keys++; if(najatState.keys>=5){ najatState.levelIdx++; if(najatState.levelIdx>=3){ najatGameWin(); return; } najatState.level=["easy","medium","hard"][najatState.levelIdx]; najatState.keys=0; najatState.currentQ=getNewQ(najatState.level); } else { najatState.currentQ=getNewQ(najatState.level); } najatState.currentPlayer = (najatState.currentPlayer+1)%najatState.players.length; najatTimer(); } else { p.health--; if(p.health<=0){ p.isAlive=false; najatState.players=najatState.players.filter(p=>p.isAlive); if(najatState.players.length===0){ najatGameOver(); return; } } najatState.currentPlayer = (najatState.currentPlayer+1)%najatState.players.length; najatTimer(); } saveToLocal(); renderNajat(); }
function najatGameWin(){ najatState.stage="win"; if(najatState.timerInt) clearInterval(najatState.timerInt); saveToLocal(); renderNajat(); }
function najatGameOver(){ najatState.stage="lose"; if(najatState.timerInt) clearInterval(najatState.timerInt); saveToLocal(); renderNajat(); }

tState.currentPlayer]; let levelName = najatState.level==="easy"?"آسان ⭐":(najatState.level==="medium"?"متوسط ⭐⭐":"سخت ⭐⭐⭐"); let html = `<div class="card"><div>${najatState.players.map(p=>`<span class="player-card">${p.name} 🎯${p.score} ❤️${p.health}</span>`).join('')}</div><div>🗡️ سطح: ${levelName} | 🔑 کلید: ${najatState.keys}/5</div><div>🎭 نوبت: ${cp.name} (❤️ ${cp.health})</div><div class="timer-box" id="najatTimer">⏱️ ${najatState.timer} ثانیه</div><div>❓ ${najatState.currentQ.text}</div><div id="najatOptions"></div><button id="najatReset" class="btn-danger">💀 نابودی</button></div>`; container.innerHTML = html; let optsDiv = document.getElementById("najatOptions"); najatState.currentQ.options.forEach(opt=>{ let btn = document.createElement("button"); btn.className="opt-btn"; btn.innerText=opt; btn.onclick = ()=>handleNajatAnswer(opt); optsDiv.appendChild(btn); }); document.getElementById("najatReset").onclick = ()=>{ if(confirm("همه پیشرفت از بین می‌رود؟")){ localStorage.removeItem("najatGame"); najatState = { stage:"setup", players:[], currentPlayer:0, usedQuestions:{easy:[],medium:[],hard:[]}, currentQ:null, timer:20, timerInt:null, level:"easy", levelIdx:0, keys:0 }; renderNajat(); } }; } else if(najatState.stage==="win"){ container.innerHTML = `<div class="card"><h2 style="color:green;">🎉 پیروزی!</h2><p>امتیاز بازی: ${najatState.players.map(p=>`${p.name}: ${p.score}`).join(' , ')}</p><button id="najatAgain" class="btn-success">🌟 بازی دوباره</button></div>`; document.getElementById("najatAgain").onclick = ()=>{ localStorage.removeItem("najatGame"); najatState = { stage:"setup", players:[], currentPlayer:0, usedQuestions:{easy:[],medium:[],hard:[]}, currentQ:null, timer:20, timerInt:null, level:"easy", levelIdx:0, keys:0 }; renderNajat(); }; } else if(najatState.stage==="lose"){ container.innerHTML = `<div class="card"><h2 style="color:red;">💀 شکست!</h2><button id="najatRetry" class="btn-warning">🔄 تلاش مجدد</button></div>`; document.getElementById("najatRetr function renderMemoryMatch() { let html = `<div class="card"><h3>🧠 بازی تطابق حافظه (بدون امتیاز اصلی)</h3><p>امتیاز شما: ${memoryMatchScore}</p><div class="flex" style="justify-content:center; flex-wrap:wrap;">`; for (let i = 0; i < memoryMatchCards.length; i++) { let isFlipped = memoryMatchFlipped[i] || memoryMatchMatched[i]; let content = isFlipped ? memoryMatchCards[i].name : "❓"; let bgColor = memoryMatchMatched[i] ? "#c8e6c9" : (memoryMatchFlipped[i] ? "#fff3cd" : "#e2e8f0"); html += `<div class="memory-card" data-idx="${i}" style="width:100px;height:100px;background:${bgColor};border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;margin:5px;">${content}</div>`; } html += `</div><div class="flex"><button id="resetMemoryMatchBtn" class="btn-warning">🔄 بازی جدید</button><button id="backMemoryMatchBtn" class="btn">بازگشت</button></div></div>`; document.getElementById('content-area').innerHTML = html; attachMemoryMatchEvents(); }
function attachMemoryMatchEvents() { document.querySelectorAll('.memory-card').forEach(card => { card.onclick = () => { if (memoryMatchLock) return; let idx = parseInt(card.dataset.idx); if (memoryMatchMatched[idx] || memoryMatchFlipped[idx]) return; memoryMatchFlipped[idx] = true; if (memoryMatchFirst === null) { memoryMatchFirst = idx; } else if (memoryMatchSecond === null && memoryMatchFirst !== idx) { memoryMatchSecond = idx; memoryMatchLock = true; setTimeout(() => { let card1 = memoryMatchCards[memoryMatchFirst]; let card2 = memoryMatchCards[memoryMatchSecond]; if (card1.pairId === card2.pairId) { memoryMatchMatched[memoryMatchFirst] = true; memoryMatchMatched[memoryMatchSecond] = true; memoryMatchScore += 10; addActivityLog(currentUser.id, "بازی تطابق", `یک جفت پیدا کرد! +۱۰ امتیاز (فقط در بازی)`); } else { memoryMatchFlipped[memoryMatchFirst] = false; memoryMatchFlipped[memoryMatchSecond] = false; } memoryMatchFirst = null; memoryMatchSecond = null; memoryMatchLock = false; renderMemoryMatch(); if (memoryMatchMatched.every(m => m === true)) { alert(`🎉 تبریک! بازی تمام شد. امتیاز شما: ${memoryMatchScore}`); } }, 500); } renderMemoryMatch(); }; }); document.getElementById('resetMemoryMatchBtn').onclick = () => initMemoryMatch(); document.getElementById('backMemoryMatchBtn').onclick = () => renderMainMenu(); }

orts.push(`${date}: ${evaluations[user.username].status==='approved'?'✅ تأیید':'❌ رد'} - ${evaluations[user.username].note||''}`); let advisorHtml=`<div><strong>📝 ارزیابی مشاور:</strong><br>${advisorReports.length?advisorReports.join(' , '):'هیچ'}</div><br>`; let feedbacks=parentFeedbacks.filter(fb=>fb.childId===user.id); let parentHtml=`<div><strong>👪 بازخورد والدین:</strong><br>${feedbacks.length?feedbacks.map(fb=>`${fb.message} ${fb.reply?`(پاسخ: ${fb.reply})`:''}`).join('<br>'):'هیچ'}</div><br>`; let quizHtml=`<div><strong>📝 نتایج آزمون:</strong><br>${quizResults.filter(r=>r.userId===user.id).map(q=>`${quizzes.find(qz=>qz.id===q.quizId)?.title||'بدون عنوان'}: ${q.score}`).join('<br>')||'هیچ'}</div><br>`; let puzzlesHtml=`<div><strong>🧩 معماهای حل شده:</strong><br>${solvedPuzzles.filter(sp=>sp.userId===user.id).map(sp=>puzzles[sp.puzzleId]?.question).join('<br>')||'هیچ'}</div><br>`; let classesHtml=`<div><strong>📚 کلاس‌ها و نمرات:</strong><br>`; let userClasses=classes.filter(c=>c.students.includes(user.id)); if(userClasses.length){ userClasses.forEach(c=>{ let grade=c.grades.find(g=>g.userId===user.id); classesHtml+=`<div>${c.name}: نمره ${grade?grade.score:'ثبت نشده'} (${grade?.comment||''})</div>`; }); } else classesHtml+=`هیچ کلاسی ثبت نشده`; classesHtml+=`</div><br>`; userCard.innerHTML=`<div class="flex" style="justify-content:space-between;"><div><h4>${user.fullName} (${user.username})</h4><p>نقش: ${user.role} | گروه: ${user.group||'—'} | ⭐ امتیاز: ${user.score===Infinity?'∞':user.score}</p></div><div><button class="btn-warning" onclick="printSmartCard(${user.id})">🖨️ پرینت</button><button class="btn" onclick="changeScore(${user.id},5)">+5</button><button class="btn-danger" onclick="changeScore(${user.id},-5)">-5</button><button class="btn" onclick="showUserAchievements(${user.id})">🏆</button><button class="btn" onclick="showUserActivity(${user.id})">📜</button><button class="btn-warning" onclick="printUserReport(${user.id})">📄</button></div></div><hr>${att function toJalali(gy,gm,gd){ let g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334]; let gy2=(gm>2)?(gy+1):gy; let days=355666+(365*gy)+Math.floor((gy+3)/4)-Math.floor((gy+99)/100)+Math.floor((gy+399)/400)+gd+g_d_m[gm-1]; let jy=-1595+(33*Math.floor(days/12053)); days%=12053; let jm=Math.floor(days/31); days%=31; if(jm>6){ jm=6; days+=31; } let jd=days+1; if(jm>6) jm+=2; else jm+=1; return {year:jy,month:jm,day:jd}; }
function getCurrentJalali(){ let d=new Date(); let j=toJalali(d.getFullYear(),d.getMonth()+1,d.getDate()); return `${j.year}/${j.month.toString().padStart(2,'0')}/${j.day.toString().padStart(2,'0')}`; }
function showReminder(){ let today=getCurrentJalali(); let upcoming=[]; for(let p of programs){ let progDate=p.date; if(progDate>today){ let diff=parseInt(progDate.split('/')[2])-parseInt(today.split('/')[2]); if(diff<=3 && diff>=0) upcoming.push(p); } } let reminderDiv=document.getElementById("reminder-area"); if(upcoming.length){ reminderDiv.style.display="block"; reminderDiv.innerHTML=`<strong>⏰ یادآور:</strong> برنامه‌های نزدیک: ${upcoming.map(p=>p.name).join(' , ')}`; } else reminderDiv.style.display="none"; }
function smartReminder(){ let today = new Date().toISOString().slice(0,10); for(let task of tasks){ if(task.deadline && task.deadline < today && !task.completedBy.includes(currentUser.id)){ addNotification(currentUser.id, "⏰ وظیفه عقب افتاده", `وظیفه "${task.title}" با مهلت ${task.deadline} انجام نشده است.`, "tasks"); } } let userAttendance = Object.entries(attendance).filter(([date,rec]) => rec[currentUser.username] === 'present').map(([d])=>d); if(userAttendance.length < 5 && Object.keys(attendance).length > 10){ addNotification(currentUser.id, "📋 هشدار غیبت", "شما در این ماه کمتر از ۵ روز حضور داشته‌اید. لطفاً تلاش کنید.", ""); } let jalali = getCurrentJalali(); let occasions = { "1404/01/01": "🎉 نوروز مبارک!", "1404/02/14": "📅 ولادت امام علی(ع)", "1404/11/22": "🇮🇷 پیروزی انقلاب" }; if(occasions[jalali]) addNotification(currentUser.id, "مناسبت امروز", occasions[jalali], ""); }
function addSubmenu(parent, title, items){ let div=document.createElement('div'); div.className='submenu'; let sum=document.createElement('summary'); sum.innerHTML=`<span style="font-weight:bold;">📁 ${title}</span>`; div.appendChild(sum); items.forEach(([text,func])=>{ let btn=document.createElement('button'); btn.textContent=text; btn.onclick=func; div.appendChild(btn); }); parent.appendChild(div); }
function showAdvancedReports() { let html = `<div class="card"><h3>📊 گزارش‌های آماری</h3><canvas id="statsChart" width="400" height="200"></canvas><button id="exportPdfReport" class="btn-purple">📄 خروجی PDF</button><button id="backToMenu" class="btn">بازگشت</button></div>`; document.getElementById('content-area').innerHTML = html; const ctx = document.getElementById('statsChart').getContext('2d'); const groups = {}; users.forEach(u => { if(u.group && u.role !== 'admin') { groups[u.group] = (groups[u.group] || 0) + u.score; } }); new Chart(ctx, { type: 'bar', data: { labels: Object.keys(groups), datasets: [{ label: 'مجموع امتیازات گروه', data: Object.values(groups), backgroundColor: '#2c7da0' }] }, options: { responsive: true, scales: { y: { beginAtZero: true } } } }); document.getElementById('exportPdfReport').onclick = () => { html2pdf().from(document.getElementById('content-area')).save(); }; document.getElementById('backToMenu').onclick = () => renderMainMenu(); }
async function exportBackupAsQR() { const fullData = { users, programs, puzzles, solvedPuzzles, messages, chatMemory, quizzes, quizResults, attendance, ministerApproval, advisorEvaluation, parentFeedbacks, examSettings, polls, tasks, notifications, activityLog, userReferrals, transactions, gallery, classes }; const jsonStr = JSON.stringify(fullData); const blob = new Blob([jsonStr], {type: "application/json"}); const url = URL.createObjectURL(blob); const qr = qrcode(0, 'M'); qr.addData(url); qr.make(); const cellSize = 4; const qrCanvas = qr.createImgTag(cellSize); const modalDiv = document.createElement('div'); modalDiv.className = 'modal'; modalDiv.innerHTML = `<div class="modal-content"><h3>📸 بکاپ با QR</h3><div class="qr-canvas">${qrCanvas}</div><p>این QR شامل لینک دانلود فایل بکاپ است. با اسکن آن توسط گزینه «ورود با اسکن QR» می‌توانید بکاپ را بازیابی کنید.</p><a href="${url}" download="yare_backup_${Date.now()}.json" class="btn-success">⬇️ دانلود مستقیم فایل</a><br><button id="closeQRModal" class="btn">بستن</button></div>`; document.body.appendChild(modalDiv); document.getElementById('closeQRModal').onclick = () => { URL.revokeObjectURL(url); modalDiv.remove(); }; }
async function importFromQR() { const modalDiv = document.createElement('div'); modalDiv.className = 'modal'; modalDiv.innerHTML = `<div class="modal-content" style="width:90%; max-width:450px;"><h3>🔍 اسکن QR کد</h3><div id="qr-reader" style="width:100%;"></div><div class="flex" style="justify-content:center; margin-top:10px;"><button id="useFileBtn" class="btn-warning">📁 انتخاب عکس از گالری</button><button id="cancelQRBtn" class="btn-danger">لغو</button></div></div>`; document.body.appendChild(modalDiv); let html5QrCode = new Html5Qrcode("qr-reader"); const qrCodeSuccessCallback = async (decodedText) => { await html5QrCode.stop(); modalDiv.remove(); try { const response = await fetch(decodedText); const jsonData = await response.json(); if(confirm("آیا می‌خواهید اطلاعات فعلی را با بکاپ اسکن شده جایگزین کنید؟")) { Object.assign(window, jsonData); saveToLocal(); alert("✅ بازیابی موفق. صفحه دوباره بارگذاری می‌شود."); location.reload(); } } catch(e) { alert("خطا: لینک QR معتبر نیست یا فایل یافت نشد."); } }; try { await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, qrCodeSuccessCallback); } catch(err) { document.getElementById('qr-reader').innerHTML = `<p style="color:red;">❌ دوربین یافت نشد. از گزینه انتخاب عکس استفاده کنید.</p>`; } document.getElementById('useFileBtn').onclick = () => { if(html5QrCode.isScanning) html5QrCode.stop(); const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.onchange = async (e) => { const file = e.target.files[0]; if(!file) return; try { const tempQr = new Html5Qrcode("temp-reader"); const fakeDiv = document.createElement('div'); fakeDiv.id="temp-reader"; fakeDiv.style.display="none"; document.body.appendChild(fakeDiv); const result = await tempQr.scanFile(file, true); fakeDiv.remove(); await qrCodeSuccessCallback(result); } catch(ex) { alert("اسکن ناموفق: " + ex); } }; fileInput.click(); }; document.getElementById('cancelQRBtn').onclick = () => { if(html5QrCode.isScanning) html5QrCode.stop(); modalDiv.remove(); }; }
function startAutoSave(){ if(autoSaveInterval) clearInterval(autoSaveInterval); autoSaveInterval = setInterval(() => { saveToLocal(); console.log("Auto-save performed"); }, 30000); }

// ---------------------------- منوی اصلی و راه‌اندازی ----------------------------
function renderMainMenu(){
    let menuDiv=document.getElementById('menu-buttons'); menuDiv.innerHTML='';
    addSubmenu(menuDiv,'📸 پروفایل من',[['مدیریت تصویر و یادداشت',showProfileManager]]);
    addSubmenu(menuDiv,'📅 برنامه‌ها',[['مشاهده',showPrograms]]);
    addSubmenu(menuDiv,'🧩 معماها',[['حل معما',showSolvePuzzles]]);
    addSubmenu(menuDiv,'📝 آزمون',[['شرکت',takeQuiz],['نتایج',viewQuizResults]]);
    addSubmenu(menuDiv,'📬 پیام',[['ارسال',showSendMessage],['دریافت',showMessages]]);
    addSubmenu(menuDiv,'🤖 چت',[['گفتگو',showChat]]);
    addSubmenu(menuDiv,'🎮 بازی‌ها',[['نمایش',showGamesHub]]);
    addSubmenu(menuDiv,'🗳️ نظرسنجی',[['شرکت در نظرسنجی',voteInPoll]]);
    addSubmenu(menuDiv,'📋 وظایف',[['مشاهده و انجام',showTasksForUser]]);
    addSubmenu(menuDiv,'🔔 اعلان‌ها',[['مشاهده',showNotifications]]);
    addSubmenu(menuDiv,'📚 کلاس‌ها',[['مشاهده کلاس‌های من',showMyClasses],['خروجی CSV کلاس‌ها',()=>exportClassesCSV()]]);
    addSubmenu(menuDiv,'🖼️ گالری',[['مشاهده گالری',showGallery]]);
    addSubmenu(menuDiv,'📊 گزارشات',[['نمودار و PDF',showAdvancedReports]]);
    addSubmenu(menuDiv,'💰 مدیریت مالی',[['نمایش',showFinancialManagement],['خروجی CSV تراکنش‌ها',()=>exportTransactionsCSV()]]);
    addSubmenu(menuDiv,'🔄 ابزارها',[['مبدل تاریخ',showDateConverter],['بکاپ شخصی',exportPersonalBackup],['بازیابی شخصی',importPersonalBackup],['📸 خروجی QR (بکاپ لینک)',exportBackupAsQR],['📲 ورود با اسکن QR',importFromQR]]);
    if(currentUser.role==='admin' || currentUser.role==='deputy'){
        let mgmtDiv = document.createElement('div'); mgmtDiv.className='submenu';
        let mgmtSum = document.createElement('summary'); mgmtSum.innerHTML = `<span style="font-weight:bold;">👑 مدیریت</span>`;
        mgmtDiv.appendChild(mgmtSum);
        let innerDiv = document.createElement('div'); innerDiv.style.marginRight='20px';
        const mgmtItems = [['مدیریت کاربران',showManageUsers],['برنامه‌ها',showManagePrograms],['معماها',showManagePuzzles],['آزمون‌ها',manageQuizzes],['نظرسنجی‌ها',showPollManagement],['مدیریت وظایف',showTaskManagement],['پاسخ به بازخورد والدین',manageParentFeedbacks],['آمار گروهی',showGroupStats],['مدیریت کلاس‌ها',showClassManagement],['مدیریت گالری',showGallery],['مدیریت جامع اعضا',showMemberManagement],['بکاپ کامل',exportFullBackup],['خروجی CSV کاربران',exportCSV],['پشتیبان ایمیل',backupToEmail],['واردات JSON',importFullJSON]];
        mgmtItems.forEach(([text,func])=>{ let btn=document.createElement('button'); btn.textContent=text; btn.onclick=func; innerDiv.appendChild(btn); });
        mgmtDiv.appendChild(innerDiv);
        menuDiv.appendChild(mgmtDiv);
    } else if(currentUser.role==='interior_minister' || currentUser.role==='governor'){ addSubmenu(menuDiv,'📋 حضور و غیاب',[['مدیریت',showAttendance]]); }
    else if(currentUser.role==='prime_minister'){ addSubmenu(menuDiv,'✅ تایید وزرا',[['مدیریت',showMinisterApproval]]); }
    else if(currentUser.role==='supreme_advisor'){ addSubmenu(menuDiv,'📝 ارزیابی',[['مدیریت',showAdvisorEvaluation]]); }
    else if(currentUser.role==='parent'){ addSubmenu(menuDiv,'👪 پنل والدین',[['مشاهده فرزندان',showParentPanel]]); }
    updateWelcome(); showReminder(); smartReminder(); document.getElementById('content-area').innerHTML='<div class="card">از منوی بالا انتخاب کنید.</div>';
}
function exportClassesCSV(){ let csvRows = [["نام کلاس", "مدرس", "زمان", "تعداد دانش‌آموزان"]]; classes.forEach(c => { csvRows.push([c.name, c.teacher, c.schedule, c.students.length]); }); let csvContent = csvRows.map(row => row.join(",")).join("\n"); let blob = new Blob(["\uFEFF" + csvContent], {type: "text/csv;charset=utf-8;"}); let link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `classes_${Date.now()}.csv`; link.click(); alert("خروجی CSV کلاس‌ها دانلود شد"); }
function exportTransactionsCSV(){ let csvRows = [["تاریخ", "نوع", "عنوان", "مبلغ", "کاربر", "توضیح"]]; transactions.forEach(t => { csvRows.push([t.date, t.type==='income'?'درآمد':'هزینه', t.title, t.amount, t.userId? (users.find(u=>u.id===t.userId)?.fullName || '—') : '—', t.desc||'']); }); let csvContent = csvRows.map(row => row.join(",")).join("\n"); let blob = new Blob(["\uFEFF" + csvContent], {type: "text/csv;charset=utf-8;"}); let link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `transactions_${Date.now()}.csv`; link.click(); alert("خروجی CSV تراکنش‌ها دانلود شد"); }
function showLogin(){ document.getElementById('login-view').style.display='block'; document.getElementById('main-view').style.display='none'; }
function showMainApp(){ document.getElementById('login-view').style.display='none'; document.getElementById('main-view').style.display='block'; startAutoSave(); renderMainMenu(); }
function init(){ loadFromLocal(); initTheme(); document.getElementById('login-btn').onclick=()=>{ let u=document.getElementById('login-username').value.trim(); let p=document.getElementById('login-password').value.trim(); let user=authenticate(u,p); if(user){ currentUser=user; showMainApp(); } else document.getElementById('login-error').innerText='نام کاربری یا رمز اشتباه است'; }; document.getElementById('logout-btn').onclick=()=>{ currentUser=null; showLogin(); }; document.getElementById('notificationIcon').onclick=()=>showNotifications(); document.getElementById('showStatusBtn').onclick=()=>showStorageStatus(); showLogin(); }
init();
</script>
